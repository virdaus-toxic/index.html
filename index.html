<h2>1. Cek Email Bocor</h2>
<input id="email" placeholder="Masukan email lu">
<button onclick="cekBocor()">CEK</button>
<p id="hasilBocor"></p>

<script>
async function cekBocor() {
  let email = document.getElementById('email').value;
  document.getElementById('hasilBocor').innerText = 'Ngecek...';
  // Pake API gratisan. Dia cuma bilang "ketemu" apa "aman"
  let res = await fetch(`https://api.proxynova.com/comb?query=${email}`);
  let data = await res.json();
  if(data.count > 0) {
    document.getElementById('hasilBocor').innerText = `⚠️ Email ini ketemu di ${data.count} data leak`;
  } else {
    document.getElementById('hasilBocor').innerText = `✅ Aman, belum ketemu bocor`;
  }
}
</script><h2>2.  Phishing</h2>
